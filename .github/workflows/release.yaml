name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

# Prevent concurrent releases from racing on tag/version bumps. Cancelling
# in progress is unsafe — a half-published release leaves the repo with
# orphaned tags or missing GitHub Releases.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          clean: true
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Capture version before release
        id: before
        run: echo "version=$(cat VERSION 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Run Semantic Release
        uses: jedi-knights/go-semantic-release@v0.10.2
        with:
          github_token: ${{ secrets.GH_TOKEN }}

      - name: Capture version after release
        id: after
        run: echo "version=$(cat VERSION 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Determine if release happened
        id: released
        run: |
          if [ -n "${{ steps.after.outputs.version }}" ] && [ "${{ steps.before.outputs.version }}" != "${{ steps.after.outputs.version }}" ]; then
            echo "yes=true" >> $GITHUB_OUTPUT
          else
            echo "yes=false" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.released.outputs.yes == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.released.outputs.yes == 'true'
        run: uv python install

      - name: Install dependencies
        if: steps.released.outputs.yes == 'true'
        run: uv sync --extra dev

      - name: Build distribution
        if: steps.released.outputs.yes == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.released.outputs.yes == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
