name: Coverage Badge

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  badge:
    name: Update Coverage Badge
    # Only run when the triggering Release workflow succeeded, or when
    # invoked manually. A failed release leaves the repo in a partial
    # state (e.g. tag pushed but no GitHub Release created); refreshing
    # the badge before that's resolved would advertise stale or
    # inconsistent coverage.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=html

      - name: Update coverage badge
        uses: jedi-knights/coverage-badge@v0
        with:
          coverage-file: coverage.xml

      - name: Commit badge update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update coverage badge [skip ci]" && git push)

      - name: Upload coverage report as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: htmlcov

  deploy:
    name: Deploy Coverage Report
    needs: badge
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
